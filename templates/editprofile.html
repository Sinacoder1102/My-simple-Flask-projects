<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile</title>
</head>
<body>

<h1>Edit Profile</h1>

<form action="/updateprofile" method="POST">

    <label>New Username</label>
    <input
        type="text"
        name="username"
        value="{{ username }}"
        required
    >

    <button type="submit">Save Changes</button>

</form>

<a href="/profile">Back</a>

</body>
</html>
