<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='register.css') }}">
</head>
<body>

    <form action="{{ url_for('saving_informations') }}" method="POST">

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash-message">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <input
            type="text"
            name="username"
            placeholder="Username"
            required
        >

        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <input
            type="password"
            name="confirmpass"
            placeholder="Confirm Password"
            required
        >

        <input
            type="number"
            name="userid"
            placeholder="User ID"
            required
        >

        <button type="submit">
            Create account!
        </button>

    </form>

</body>
</html>
